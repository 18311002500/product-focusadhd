# .github/workflows/screenshots.yml
# 使用 GitHub Actions 自动生成 iOS 截图
# 触发方式：手动触发 或 推送到 main 分支

name: Generate App Store Screenshots

on:
  # 手动触发
  workflow_dispatch:
  
  # 推送到 main 分支时触发
  push:
    branches: [ main ]
    paths:
      - 'FocusFlow/**'
      - '.github/workflows/screenshots.yml'

jobs:
  screenshots:
    runs-on: macos-14  # 使用 macOS 14 (免费)
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.2'
    
    - name: List available simulators
      run: xcrun simctl list devices
    
    - name: Boot iPhone 15 Pro Max Simulator
      run: |
        # 启动 iPhone 15 Pro Max 模拟器
        DEVICE_ID=$(xcrun simctl list devices | grep "iPhone 15 Pro Max" | grep -oE '[0-9A-F]{8}-([0-9A-F]{4}-){3}[0-9A-F]{12}' | head -1)
        echo "Device ID: $DEVICE_ID"
        xcrun simctl boot "$DEVICE_ID"
        echo "DEVICE_ID=$DEVICE_ID" >> $GITHUB_ENV
        
    - name: Wait for simulator to be ready
      run: |
        xcrun simctl bootstatus $DEVICE_ID -b
        sleep 10
    
    - name: Build and install app
      run: |
        cd FocusFlow
        # 构建应用
        xcodebuild build \
          -scheme FocusFlow \
          -destination "platform=iOS Simulator,name=iPhone 15 Pro Max" \
          -derivedDataPath DerivedData \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO
        
        # 安装到模拟器
        APP_PATH=$(find DerivedData -name "FocusFlow.app" -type d | head -1)
        echo "App path: $APP_PATH"
        xcrun simctl install $DEVICE_ID "$APP_PATH"
        
    - name: Launch app and take screenshots
      run: |
        # 启动应用
        xcrun simctl launch $DEVICE_ID com.focusflow.app
        sleep 5
        
        # 创建截图目录
        mkdir -p screenshots
        
        # 截图 1: 首页
        xcrun simctl io $DEVICE_ID screenshot screenshots/screenshot1_home.png
        sleep 2
        
        # 点击专注 Tab（需要知道坐标或使用辅助功能）
        # 这里简化处理，实际使用时需要更精确的控制
        
        # 截图 2-5: 其他页面
        # 由于没有 Mac 界面交互，这里使用备用方案
        
    - name: Upload screenshots as artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ios-screenshots
        path: screenshots/*.png
        
    - name: Shutdown simulator
      if: always()
      run: xcrun simctl shutdown $DEVICE_ID || true
