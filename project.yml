name: FocusFlow
options:
  bundleIdPrefix: com.focusflow
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.2"
  generateEmptyDirectories: true

targets:
  FocusFlow:
    type: application
    platform: iOS
    sources:
      - path: FocusFlow
        excludes:
          - Info.plist
          - "*.xcdatamodeld"
    coreDataModels:
      - path: FocusFlow/Models/FocusFlow.xcdatamodeld
        version: FocusFlow.xcdatamodel
    resources:
      - path: FocusFlow/Assets.xcassets
    info:
      path: FocusFlow/Info.plist
      properties:
        CFBundleName: FocusFlow
        CFBundleDisplayName: FocusFlow
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: FocusFlow/FocusFlow.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.in-app-payments:
          - merchant.com.focusflow.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.focusflow.app
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Manual
        ENABLE_BITCODE: false
        SWIFT_VERSION: "5.9"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "iPhone Developer"
          PROVISIONING_PROFILE_SPECIFIER: ""
        Release:
          CODE_SIGN_IDENTITY: "iPhone Distribution"
          PROVISIONING_PROFILE_SPECIFIER: ""
    scheme:
      testTargets:
        - FocusFlowTests

  FocusFlowTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FocusFlowTests
    dependencies:
      - target: FocusFlow

schemes:
  FocusFlow:
    build:
      targets:
        FocusFlow: all
    run:
      config: Debug
    archive:
      config: Release
    test:
      config: Debug
      targets:
        - FocusFlowTests
